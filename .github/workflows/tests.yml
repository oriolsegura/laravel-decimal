name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4, 8.5]
        testbench: [9.0, 10.0, 11.0] # 9.0 = Laravel 11, 10.0 = Laravel 12, 11.0 = Laravel 13
        exclude:
          - php: 8.5
            testbench: 9.0
          - php: 8.2
            testbench: 11.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath
          coverage: pcov
          tools: composer:v2

      - name: Force Laravel version
        run: composer require "orchestra/testbench:^${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Execute tests with coverage
        run: vendor/bin/phpunit --coverage-text
